<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
 
    <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

    .main{
    width:380px;
    position:absolute;
    }

.fa-xmark{
    position:absolute;
    right:18px;
    top:18px;
    font-size:22px;
    cursor:pointer;
    color:#444;
    transition:.3s;
}

.fa-xmark:hover{
    transform:rotate(90deg);
}

.login{
    background:white;
    border-radius:28px;
    padding:40px 35px;
    display:flex;
    flex-direction:column;
    align-items:center;
    box-shadow:0 12px 30px rgba(0,0,0,.12);
    transition:.35s ease;
}

.login:hover{
    transform:translateY(-5px);
    box-shadow:0 18px 40px rgba(0,0,0,.15);
}

.login span{
    font-size:28px;
    font-weight:600;
}

.login input{
    width:100%;
    height:48px;
    margin-top:20px;
    padding:0 18px;
    border:1px solid #ddd;
    border-radius:30px;
    outline:none;
    font-size:15px;
    transition:.3s;
    background:white;
}

.login input:focus{
    border-color:#888;
    box-shadow:0 0 10px rgba(0,0,0,.08);
}

.btn{
    width:100%;
    height:48px;
    margin-top:28px;
    border:none;
    border-radius:30px;
    background:white;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(0,0,0,.18);
}

.btn:active{
    transform:scale(.98);
}

.login p{
    margin:22px 0 12px;
    color:#666;
}

.existing{
    width:100%;
    height:48px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:30px;
    cursor:pointer;
    transition:.3s;
    background:white;
}

.existing:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 18px rgba(0,0,0,.12);
}

.existing i{
    font-size:20px;
    color:#333;
}

.existing p{
    margin:0;
    color:#333;
    font-size:15px;
}
    </style>
</head>
<body>
    <div class="main" id="maindiv">
    <div class="login">

        <i class="fa-solid fa-xmark" onclick="window.location.href='/'"></i>

        <span><b>Login / Sign Up</b></span>

        <input type="text" placeholder="Enter Username..." id="n">
        <input type="password" placeholder="Enter Password..." id="p">

        <button class="btn">Login</button>

        <p>or</p>

        <div class="existing">
            <i class="fa-brands fa-google" style="color:#EA4335;"></i>
            <p>Continue with Google</p>
        </div>

        <div class="existing">
            <i class="fa-brands fa-apple"></i>
            <p>Continue with Apple</p>
        </div>

    </div>
</div>
<script src="home.js"></script>
    
</body>
</html>
